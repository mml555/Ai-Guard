{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ai-guard.fullname" . }}-api
  labels:
    {{- include "ai-guard.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      {{- include "ai-guard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Traffic to the API port from within the release namespace (ingress
    # controller, sidecars) plus any explicitly allowed namespaces.
    - from:
        - podSelector: {}
        {{- range .Values.networkPolicy.ingressNamespaceSelectors }}
        - namespaceSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS resolution.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # In-cluster dependencies in the same namespace: LiteLLM, Redis, Presidio.
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 4000
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 3000
    # Postgres — typically a managed instance outside the cluster. Tighten the
    # destination with networkPolicy.extraEgress in locked-down environments.
    - to: []
      ports:
        - protocol: TCP
          port: 5432
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
