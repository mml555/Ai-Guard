apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-guard.fullname" . }}
  labels:
    {{- include "ai-guard.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "ai-guard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "ai-guard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        # Roll pods when the config or litellm config changes.
        checksum/config: {{ .Values.config.aiGuardYaml | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: {{ include "ai-guard.secretName" . }}
          env:
            - name: AI_GUARD_CONFIG
              value: /config/ai-guard.yaml
            - name: LITELLM_BASE_URL
              value: {{ include "ai-guard.litellmUrl" . | quote }}
            {{- $redis := include "ai-guard.redisUrl" . }}
            {{- if $redis }}
            - name: REDIS_URL
              value: {{ $redis | quote }}
            {{- end }}
            {{- if .Values.presidio.enabled }}
            - name: PRESIDIO_ANALYZER_URL
              value: {{ printf "http://%s-presidio-analyzer:3000" (include "ai-guard.fullname" .) | quote }}
            - name: PRESIDIO_ANONYMIZER_URL
              value: {{ printf "http://%s-presidio-anonymizer:3000" (include "ai-guard.fullname" .) | quote }}
            {{- end }}
            - name: METRICS_ENABLED
              value: {{ .Values.api.metricsEnabled | quote }}
            - name: IDEMPOTENCY_CAPTURE_CONTENT
              value: {{ .Values.api.idempotencyCaptureContent | quote }}
            - name: OBSERVABILITY_CAPTURE_CONTENT
              value: {{ .Values.api.observabilityCaptureContent | quote }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          # /health is process-only (a DB blip must not restart pods);
          # /ready gates on the DB and drives traffic routing.
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ai-guard.configMapName" . }}
