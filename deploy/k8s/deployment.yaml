# NOTE: These raw manifests are a minimal starting point. The Helm chart at
# deploy/helm/modelgov is the recommended, hardened deploy path — it adds a
# render-time image-pinning guard, PodDisruptionBudget, NetworkPolicy,
# topology spread, migration hook, and keeps this securityContext in sync.
# Prefer Helm for production; treat this file as illustrative.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modelgov-api
  namespace: modelgov
spec:
  replicas: 2
  selector:
    matchLabels:
      app: modelgov-api
  template:
    metadata:
      labels:
        app: modelgov-api
    spec:
      # Pod-level hardening (mirrors the Helm chart's api.podSecurityContext).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          # Fix the org placeholder to the repo convention. Pin the tag to a
          # released version (or a @sha256 digest) before deploying.
          image: ghcr.io/mml555/modelgov/modelgov-api:REPLACE_TAG
          # Container-level hardening (mirrors api.containerSecurityContext).
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: modelgov-secrets
          env:
            - name: MODELGOV_CONFIG
              value: /config/modelgov.yaml
            - name: LITELLM_BASE_URL
              value: http://litellm:4000
            - name: REDIS_URL
              value: redis://redis:6379
            - name: METRICS_ENABLED
              value: "true"
            - name: IDEMPOTENCY_CAPTURE_CONTENT
              value: "false"
            - name: OBSERVABILITY_CAPTURE_CONTENT
              value: "false"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            # readOnlyRootFilesystem needs a writable scratch dir.
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            periodSeconds: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: modelgov-config
        - name: tmp
          emptyDir: {}
