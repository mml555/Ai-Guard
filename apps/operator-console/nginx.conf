# SPA static serving for the operator console. react-router uses client-side
# routes (/overview, /keys, …), so any unknown path falls back to index.html.
# The unprivileged nginx image listens on 8080 as a non-root user.
# Security headers. The CSP is the backstop for the sessionStorage-held admin
# token: even if an XSS slips in (e.g. via a compromised build dependency),
# inline script is refused and exfiltration targets are limited. connect-src
# allows any https/http origin because the API base URL is chosen at login —
# the console is one static build serving every deployment.
#
# Repeated per-location on purpose: nginx `add_header` inheritance is
# all-or-nothing — a location with its own add_header (the cache headers below)
# silently DROPS every server-level header, so server-level security headers
# would never reach the client.
map $sent_http_content_type $csp {
  default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https: http:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
}

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache the fingerprinted assets; never cache the HTML entrypoint.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Content-Security-Policy $csp always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
    add_header Content-Security-Policy $csp always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
  }
}
