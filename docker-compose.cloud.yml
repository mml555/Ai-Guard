# Cloud-provider OVERLAY for local development with real OpenAI/Anthropic keys.
# This is an overlay, not a standalone stack — it only redefines the litellm
# service and will NOT run on its own. Layer it over the simple base file:
#   docker compose -f docker-compose.simple.yml -f docker-compose.cloud.yml up --build

name: modelgov

services:
  litellm:
    command: ["--config", "/app/config.cloud.yaml", "--port", "4000"]
    volumes:
      - ./litellm_config.cloud.yaml:/app/config.cloud.yaml:ro
