# Simple deploy: zero-secret local Modelgov stack.
#   ./setup
#
# Backing services publish to 127.0.0.1 only (dev-local). Third-party images use
# floating tags here for convenience; production pins them via required env vars
# in docker-compose.production.yml — see .env.production.example.
name: modelgov

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: modelgov
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 1G

  litellm:
    # pin: update deliberately (was floating :main-stable — a moving tag drifts
    # the dev stack under everyone without a commit). Bump this intentionally.
    image: ghcr.io/berriai/litellm:main-v1.75.5-stable
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    # Pass ONLY provider credentials + the master key to this third-party image —
    # not `env_file: .env`, which would also hand it DATABASE_URL, MODELGOV_API_KEY,
    # and Postgres creds. The setup wizard writes provider keys into .env; compose
    # substitutes them here (absent ones resolve to empty). Add a line when you
    # enable a new provider that needs an env credential.
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-modelgov-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      AZURE_API_KEY: ${AZURE_API_KEY:-}
      AZURE_API_BASE: ${AZURE_API_BASE:-}
      AZURE_API_VERSION: ${AZURE_API_VERSION:-}
      AZURE_AI_API_KEY: ${AZURE_AI_API_KEY:-}
      AZURE_AI_API_BASE: ${AZURE_AI_API_BASE:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-}
      VERTEX_PROJECT: ${VERTEX_PROJECT:-}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-}
      # Path to a mounted service-account JSON (Vertex file auth also needs the
      # file bind-mounted into this container).
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      GITHUB_COPILOT_TOKEN: ${GITHUB_COPILOT_TOKEN:-}
    volumes:
      # Default to the generated config (seeded from litellm_config.yaml by the
      # CLI before `up`). The setup wizard rewrites THIS same host file in place,
      # and the api container recreates litellm so a provider change goes live —
      # the api mounts the same file (see below) so its writes land on the host.
      # create_host_path:false → if the seed is missing (e.g. a raw `docker compose
      # up` that skipped the CLI), fail loudly with "source path does not exist"
      # instead of Docker silently creating a DIRECTORY that crash-loops LiteLLM.
      - type: bind
        source: ${LITELLM_CONFIG_PATH:-./litellm_config.generated.yaml}
        target: /app/config.yaml
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      # The litellm image ships python (no curl guaranteed). /health/liveliness is
      # unauthenticated. start_period covers the cold-boot warmup so a slow first
      # run isn't reported unhealthy (and the CLI's readiness wait isn't misled).
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  demo-llm:
    build:
      context: ./tools/demo-llm
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 128M

  presidio-analyzer:
    # pin: update deliberately (was floating :latest)
    image: mcr.microsoft.com/presidio-analyzer:2.2.355
    deploy:
      resources:
        limits:
          # spaCy en_core_web_lg's resident set is ~1GB; a hard 1G cgroup can
          # OOM-kill it mid-load on some hosts (→ presidio never becomes ready and
          # setup times out). 2G gives headroom. Override via PRESIDIO_ANALYZER_MEMORY.
          memory: ${PRESIDIO_ANALYZER_MEMORY:-2G}

  presidio-anonymizer:
    # pin: update deliberately (was floating :latest)
    image: mcr.microsoft.com/presidio-anonymizer:2.2.355
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    # LOCAL DEV ONLY. Running as root + the docker.sock mount below let the setup
    # wizard restart the litellm proxy so new provider keys go live without a
    # terminal command. docker.sock is effectively host-root, so this is scoped to
    # this local/demo compose (bound to 127.0.0.1) and MUST NOT appear in any
    # production compose or the Helm chart. The setup API that uses it is itself
    # gated off when MODELGOV_PRODUCTION=true. Remove both lines to opt out — the
    # wizard then falls back to printing `pnpm modelgov reload-providers`.
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      demo-llm:
        condition: service_healthy
      litellm:
        condition: service_started
      presidio-analyzer:
        condition: service_started
      presidio-anonymizer:
        condition: service_started
    environment:
      PORT: 3000
      MODELGOV_API_KEY: ${MODELGOV_API_KEY:-sk-modelgov-api-local}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/modelgov
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-modelgov-local}
      MODELGOV_CONFIG: /app/modelgov.yaml
      PRESIDIO_ANALYZER_URL: http://presidio-analyzer:3000
      PRESIDIO_ANONYMIZER_URL: http://presidio-anonymizer:3000
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5174,http://127.0.0.1:5174}
      POLICY_STORE_ENABLED: "true"
      POLICY_HOT_RELOAD: "true"
      MODELGOV_SETUP_API: "true"
      MODELGOV_PROJECT_ROOT: /project
    volumes:
      - ./modelgov.yaml:/app/modelgov.yaml:ro
      # .env holds provider secrets the wizard reads/writes; the CLI creates it
      # before `up`. create_host_path:false → a raw `docker compose up` that
      # skipped the CLI fails clearly instead of mounting an empty directory.
      - type: bind
        source: ./.env
        target: /project/.env
        bind:
          create_host_path: false
      # The setup wizard writes the generated LiteLLM config to
      # $MODELGOV_PROJECT_ROOT/litellm_config.generated.yaml. Bind it to the host
      # so the write reaches the SAME file the litellm container reads (above) —
      # without this, the wizard's cloud-provider path writes into the container
      # only and the proxy never sees it. Seeded on the host by the CLI before up.
      - type: bind
        source: ./litellm_config.generated.yaml
        target: /project/litellm_config.generated.yaml
        bind:
          create_host_path: false
      - /var/run/docker.sock:/var/run/docker.sock
    ports: ["127.0.0.1:${MODELGOV_PUBLIC_PORT:-3090}:3000"]
    healthcheck:
      # Node-based (no dependency on wget/busybox being present in the image).
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          memory: 512M

  console:
    build:
      context: .
      dockerfile: apps/operator-console/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports: ["127.0.0.1:${MODELGOV_CONSOLE_PORT:-5174}:8080"]
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
